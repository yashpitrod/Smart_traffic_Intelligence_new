# ─────────────────────────────────────────────────────────────────────────────
# Deploy Pipeline — runs on push to main
# ─────────────────────────────────────────────────────────────────────────────
name: Deploy — Main Branch

on:
  push:
    branches: [main]

concurrency:
  group: deploy-main
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/sti-backend

permissions:
  contents: read
  packages: write

jobs:
  # ── Full Test Suite ───────────────────────────────────────────────────────
  test-backend:
    name: Backend — Full Test Suite
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements*.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r backend/requirements.txt -r backend/requirements-dev.txt

      - name: Run full pytest suite
        run: python -m pytest backend/tests/ -v --tb=short --junitxml=pytest-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: pytest-results.xml

  test-frontend:
    name: Frontend — Full Test Suite
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Jest tests
        run: npm test -- --ci --coverage --coverageReporters=text

  # ── Docker Build + Push to GHCR ──────────────────────────────────────────
  docker-push:
    name: Docker — Build & Push to GHCR
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ── Frontend Production Build Verification ───────────────────────────────
  frontend-build:
    name: Frontend — Production Build
    runs-on: ubuntu-latest
    needs: [test-frontend]
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

  # ── Deployment Readiness ─────────────────────────────────────────────────
  deploy-ready:
    name: Deployment Readiness ✅
    runs-on: ubuntu-latest
    needs: [docker-push, frontend-build]
    if: success()

    steps:
      - name: Deployment readiness summary
        run: |
          echo "╔══════════════════════════════════════════╗"
          echo "║   ✅ ALL CHECKS PASSED — DEPLOY READY   ║"
          echo "╠══════════════════════════════════════════╣"
          echo "║ Backend tests:    PASSED                 ║"
          echo "║ Frontend tests:   PASSED                 ║"
          echo "║ Docker image:     PUSHED to GHCR         ║"
          echo "║ Frontend build:   VERIFIED                ║"
          echo "╚══════════════════════════════════════════╝"
          echo ""
          echo "Docker image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          echo "Render will auto-deploy from GHCR on next pull."
