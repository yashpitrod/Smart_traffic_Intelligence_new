[pytest]
# Run from Smart_traffic_Intelligence/ root:
#   pytest backend/tests/ -v --cov=backend --cov-report=term-missing

testpaths = backend/tests
asyncio_mode = auto
pythonpath = ..

# Show extra test summary for failures, errors, skips
addopts =
    -v
    --tb=short
    --strict-markers
    --cov=backend
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-fail-under=15

# Custom markers
markers =
    unit: Pure unit tests with no I/O
    integration: Tests that exercise multiple components together
    slow: Tests that take >1s (skipped in fast mode)

# Filter noisy warnings from third-party libs
filterwarnings =
    ignore::DeprecationWarning:pydantic.*:
    ignore::DeprecationWarning:fastapi.*:
    ignore::UserWarning:xgboost.*:
